// ====== RENDER ======
const babNav = document.getElementById('babNav');
const babContainer = document.getElementById('babContainer');

allBabs.forEach((bab, bi) => {
    // Nav button
    const btn = document.createElement('button');
    btn.className = 'bab-btn' + (bi===0?' active':'');
    btn.textContent = 'Bab ' + (bi+1);
    btn.onclick = () => showBab(bi);
    babNav.appendChild(btn);

    // Content
    const div = document.createElement('div');
    div.className = 'bab-content' + (bi===0?' active':'');
    div.id = 'bab'+bi;
    div.innerHTML = renderBab(bab, bi);
    babContainer.appendChild(div);
});

function showBab(i) {
    document.querySelectorAll('.bab-btn').forEach((b,j) => b.classList.toggle('active',j===i));
    document.querySelectorAll('.bab-content').forEach((d,j) => d.classList.toggle('active',j===i));
    window.scrollTo(0,200);
}

function renderBab(bab, bi) {
    let html = '<h2 class="bab-header">'+bab.title+'</h2>';
    let qNum = 1;
    let mcItems = [];
    let rdItems = [];
    let susItems = [];

    bab.soal.forEach(item => {
        if(item.type==='mc') mcItems.push(item);
        else if(item.type==='read') rdItems.push(item);
        else if(item.type==='sus') susItems.push(item);
    });

    // Bagian A
    html += '<div class="bagian-title">Bagian A: Pilih Arti yang Benar (15 soal)</div>';
    mcItems.slice(0,15).forEach((item,i) => {
        html += renderMC(item, bi, qNum); qNum++;
    });

    // Bagian B
    html += '<div class="bagian-title">Bagian B: Baca & Pahami (15 soal)</div>';
    rdItems.forEach(rd => {
        html += '<div class="soal-item" style="border-left-color:#e63946;"><div class="soal-q">📖 '+rd.passage+'</div></div>';
        rd.questions.forEach(q => {
            html += renderMC(q, bi, qNum); qNum++;
        });
    });

    // Bagian C
    html += '<div class="bagian-title">Bagian C: Susun Kalimat (10 soal)</div>';
    susItems.forEach((item,i) => {
        html += renderSusun(item, bi, qNum); qNum++;
    });

    html += '<div style="text-align:center;margin:20px 0;">';
    html += '<button class="btn-check" onclick="checkBab('+bi+')">✅ Periksa Jawaban</button>';
    html += '<button class="btn-check btn-toggle" onclick="toggleKey('+bi+')">🔑 Kunci Jawaban</button>';
    html += '</div>';
    html += '<div class="score-display" id="score'+bi+'"></div>';
    html += '<div class="answer-key" id="key'+bi+'"></div>';

    return html;
}

function renderMC(item, bi, qn) {
    let h = '<div class="soal-item" id="q'+bi+'_'+qn+'"><div class="soal-q">'+qn+'. '+item.q+'</div><div class="soal-opts">';
    const labels = ['A','B','C','D'];
    item.opts.forEach((o,oi) => {
        h += '<label><input type="radio" name="q'+bi+'_'+qn+'" value="'+oi+'" data-correct="'+item.ans+'"> '+labels[oi]+'. '+o+'</label>';
    });
    h += '</div></div>';
    return h;
}

function renderSusun(item, bi, qn) {
    const shuffled = [...item.words].sort(() => Math.random()-0.5);
    let h = '<div class="soal-item" id="q'+bi+'_'+qn+'" data-answer="'+item.answer+'">';
    h += '<div class="soal-q">'+qn+'. Susun kata-kata berikut menjadi kalimat yang benar:</div>';
    h += '<div class="answer-line" id="line'+bi+'_'+qn+'"></div>';
    h += '<div class="susun-area">';
    shuffled.forEach((w,wi) => {
        h += '<span class="word-chip" onclick="placeWord(this,'+bi+','+qn+')">'+w+'</span>';
    });
    h += '</div></div>';
    return h;
}

function placeWord(chip, bi, qn) {
    const line = document.getElementById('line'+bi+'_'+qn);
    if(chip.classList.contains('placed')) {
        chip.classList.remove('placed');
        chip.parentElement !== line && chip.parentElement.appendChild(chip);
        const inLine = line.querySelector('[data-text="'+chip.textContent+'"]');
        if(inLine) inLine.remove();
        // move back
        const area = chip.closest('.soal-item').querySelector('.susun-area');
        area.appendChild(chip);
        chip.classList.remove('placed');
    } else {
        chip.classList.add('placed');
        line.appendChild(chip);
    }
}

function checkBab(bi) {
    let correct = 0, total = 0;
    const div = document.getElementById('bab'+bi);
    // Check MC
    div.querySelectorAll('input[type=radio]:checked').forEach(inp => {
        total++;
        const item = inp.closest('.soal-item');
        if(parseInt(inp.value) === parseInt(inp.dataset.correct)) {
            correct++;
            item.classList.add('correct');
            item.classList.remove('wrong');
        } else {
            item.classList.add('wrong');
            item.classList.remove('correct');
        }
    });
    // Check Susun
    div.querySelectorAll('[data-answer]').forEach(item => {
        total++;
        const line = item.querySelector('.answer-line');
        const chips = line.querySelectorAll('.word-chip');
        const userAns = Array.from(chips).map(c => c.textContent).join('');
        const correctAns = item.dataset.answer.replace(/\s/g,'');
        if(userAns === correctAns) {
            correct++;
            item.classList.add('correct');
            item.classList.remove('wrong');
        } else {
            item.classList.add('wrong');
            item.classList.remove('correct');
        }
    });
    const sc = document.getElementById('score'+bi);
    sc.style.display = 'block';
    sc.textContent = '🎯 Skor: ' + correct + ' / ' + total + ' (' + Math.round(correct/total*100) + '%)';
}

function toggleKey(bi) {
    const key = document.getElementById('key'+bi);
    if(key.classList.contains('show')) {
        key.classList.remove('show');
        return;
    }
    let html = '<h3>🔑 Kunci Jawaban</h3>';
    const div = document.getElementById('bab'+bi);
    let qn = 1;
    const labels = ['A','B','C','D'];
    div.querySelectorAll('.soal-item').forEach(item => {
        const radios = item.querySelectorAll('input[type=radio]');
        if(radios.length > 0) {
            const correct = parseInt(radios[0].dataset.correct);
            html += qn + '. ' + labels[correct] + ' &nbsp; ';
            qn++;
        } else if(item.dataset.answer) {
            html += qn + '. ' + item.dataset.answer + ' &nbsp; ';
            qn++;
        }
    });
    key.innerHTML = html;
    key.classList.add('show');
}
