<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Soal HSK 4 — Modul HSK Mandarin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .soal-container{max-width:900px;margin:30px auto;padding:0 20px}
        .bab-section{margin-bottom:50px}
        .bab-title{font-size:1.5rem;color:#1890ff;border-bottom:2px solid #1890ff;padding-bottom:8px;margin:40px 0 20px;cursor:pointer}
        .bab-title:hover{color:#096dd9}
        .bagian-title{font-size:1.1rem;color:#333;margin:24px 0 12px;background:#f0f7ff;padding:10px 16px;border-radius:8px;font-weight:600}
        .soal-card{background:#fff;border-radius:10px;padding:18px 20px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.05);border-left:3px solid #d9d9d9;transition:border-color .2s}
        .soal-card.correct{border-left-color:#52c41a;background:#f6ffed}
        .soal-card.wrong{border-left-color:#ff4d4f;background:#fff2f0}
        .soal-num{font-weight:700;color:#1890ff;margin-right:8px}
        .soal-text{font-size:1.05rem;margin-bottom:10px;line-height:1.6}
        .soal-text .zh{font-size:1.15rem;font-weight:600}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .opt-btn{padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:14px;transition:all .2s}
        .opt-btn:hover{border-color:#1890ff;background:#f0f7ff}
        .opt-btn.selected{border-color:#1890ff;background:#e6f4ff}
        .opt-btn.correct-answer{border-color:#52c41a;background:#f6ffed}
        .opt-btn.wrong-answer{border-color:#ff4d4f;background:#fff2f0}
        .paragraph-box{background:#fffbe6;padding:16px;border-radius:8px;margin-bottom:12px;font-size:1.05rem;line-height:1.8;border:1px solid #ffe58f}
        .arrange-box{background:#f6f6f6;padding:14px;border-radius:8px;margin:8px 0}
        .arrange-words{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
        .word-chip{padding:6px 14px;background:#fff;border:2px solid #d9d9e0;border-radius:20px;cursor:pointer;font-size:14px;transition:all .2s;user-select:none}
        .word-chip:hover{border-color:#1890ff;background:#f0f7ff}
        .word-chip.used{opacity:.3;pointer-events:none}
        .answer-area{min-height:44px;border:2px dashed #d9d9d9;border-radius:8px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
        .answer-chip{padding:6px 12px;background:#1890ff;color:#fff;border-radius:20px;font-size:14px;cursor:pointer}
        .answer-chip:hover{background:#096dd9}
        .kunci-toggle{display:inline-block;padding:10px 20px;background:#faad14;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;margin:10px 0}
        .kunci-toggle:hover{background:#d48806}
        .kunci-box{display:none;background:#fffbe6;padding:16px;border-radius:8px;margin:10px 0;border:1px solid #ffe58f}
        .kunci-box.show{display:block}
        .kunci-item{padding:4px 0;font-size:14px}
        .kunci-item .correct{color:#52c41a;font-weight:600}
        .score-box{background:#fff;padding:16px 20px;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,.06);margin:16px 0;text-align:center}
        .score-box .score{font-size:2rem;font-weight:700;color:#1890ff}
        .check-btn{padding:12px 28px;background:#1890ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;margin:10px 4px}
        .check-btn:hover{background:#096dd9}
        .reset-btn{padding:12px 28px;background:#ff4d4f;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600;margin:10px 4px}
        .bab-content{display:none}
        .bab-content.active{display:block}
        .nav-bab{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0}
        .nav-bab button{padding:8px 14px;border:2px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
        .nav-bab button:hover,.nav-bab button.active{border-color:#1890ff;background:#e6f4ff;color:#1890ff}
        @media(max-width:600px){.options{grid-template-columns:1fr}.soal-card{padding:14px}}
    </style>
</head>

    <script>

    if(sessionStorage.getItem('hsk_auth')!=='true'){window.location.href='menu.html';}

    // ===== SOAL DATA =====
    const SOAL_DATA = {
1: {"title": "Bab 1: Ekonomi & Keuangan", "a": [{"q": "公司今年的利润增长了百分之二十。", "opts": ["Laba perusahaan tahun ini tumbuh 20%.", "Perusahaan rugi 20% tahun ini.", "Karyawan perusahaan bertambah 20%.", "Harga saham naik 20%."], "ans": 0}, {"q": "他决定投资房地产。", "opts": ["Dia memutuskan menjual rumahnya.", "Dia memutuskan berinvestasi di properti.", "Dia memutuskan menyewa apartemen.", "Dia memutuskan pindah rumah."], "ans": 1}, {"q": "国际贸易对两国都有好处。", "opts": ["Perdagangan internasional merugikan kedua negara.", "Kedua negara menolak perdagangan.", "Perdagangan internasional menguntungkan kedua negara.", "Perdagangan domestik lebih penting."], "ans": 2}, {"q": "市场竞争越来越激烈。", "opts": ["Pasar semakin sepi.", "Persaingan pasar semakin ketat.", "Harga pasar semakin turun.", "Pasar akan segera ditutup."], "ans": 1}, {"q": "年轻人的消费观念正在改变。", "opts": ["Anak muda tidak suka belanja.", "Pola konsumsi anak muda sedang berubah.", "Anak muda semakin hemat.", "Orang tua lebih konsumtif daripada anak muda."], "ans": 1}, {"q": "石油价格最近涨了不少。", "opts": ["Harga minyak turun drastis.", "Harga minyak stabil.", "Harga minyak akhir-akhir ini naik cukup banyak.", "Minyak sudah tidak diproduksi lagi."], "ans": 2}, {"q": "每个公民都应该按时交税。", "opts": ["Pajak hanya untuk orang kaya.", "Setiap warga negara harus membayar pajak tepat waktu.", "Pajak sudah dihapuskan.", "Hanya perusahaan yang perlu bayar pajak."], "ans": 1}, {"q": "人民币是中国的货币。", "opts": ["Renminbi adalah mata uang Jepang.", "Renminbi adalah mata uang Tiongkok.", "Yuan adalah mata uang Korea.", "Dolar adalah mata uang Tiongkok."], "ans": 1}, {"q": "他向银行申请了贷款买房子。", "opts": ["Dia menabung di bank untuk beli mobil.", "Dia mengajukan pinjaman ke bank untuk beli rumah.", "Dia menutup rekening banknya.", "Dia membayar utangnya ke bank."], "ans": 1}, {"q": "公司已经制定了明年的预算。", "opts": ["Perusahaan belum punya rencana.", "Perusahaan sudah menyusun anggaran tahun depan.", "Perusahaan membatalkan anggarannya.", "Anggaran perusahaan berkurang."], "ans": 1}, {"q": "最近股票市场波动很大。", "opts": ["Pasar saham sangat stabil belakangan ini.", "Saham sudah tidak diperjualbelikan.", "Akhir-akhir ini pasar saham sangat fluktuatif.", "Pasar saham ditutup untuk sementara."], "ans": 2}, {"q": "这个项目需要大量资金。", "opts": ["Proyek ini membutuhkan banyak dana.", "Proyek ini sudah selesai.", "Proyek ini tidak perlu uang.", "Dana proyek sudah cukup."], "ans": 0}, {"q": "中国是世界上最大的出口国之一。", "opts": ["Tiongkok tidak mengekspor barang.", "Tiongkok hanya mengimpor barang.", "Tiongkok adalah salah satu pengekspor terbesar di dunia.", "Tiongkok adalah negara terkecil di dunia."], "ans": 2}, {"q": "双方已经签了合同。", "opts": ["Kedua pihak membatalkan kontrak.", "Kontrak belum dibuat.", "Kedua pihak sudah menandatangani kontrak.", "Hanya satu pihak yang setuju."], "ans": 2}, {"q": "公司连续两年亏损。", "opts": ["Perusahaan untung besar selama dua tahun.", "Perusahaan rugi selama dua tahun berturut-turut.", "Perusahaan baru berdiri dua tahun.", "Perusahaan tutup selama dua tahun."], "ans": 1}], "b_paragraphs": [{"text": "近年来，中国的经济发展非常快。很多外国公司看到了中国市场的巨大潜力，纷纷来中国投资。不过，市场竞争也变得越来越激烈。为了在竞争中取得优势，企业需要不断创新，提高产品质量，同时降低生产成本。专家认为，未来中国经济将从出口导向型转变为消费驱动型。", "questions": [{"q": "根据文章，外国公司为什么来中国？", "opts": ["因为中国劳动力便宜", "因为看到了中国市场的巨大潜力", "因为中国政府邀请它们", "因为中国没有竞争"], "ans": 1}, {"q": "文章提到企业需要怎么做才能取得优势？", "opts": ["降低员工工资", "搬到别的国家", "不断创新，提高质量，降低成本", "减少产品种类"], "ans": 2}, {"q": "专家认为中国经济未来会怎样变化？", "opts": ["完全依赖出口", "从出口导向转为消费驱动", "停止发展", "只发展农业"], "ans": 1}]}, {"text": "银行利息越来越低，很多人开始寻找其他投资方式。股票市场虽然收益高，但风险也很大。房地产曾经是最受欢迎的投资选择，但现在房价已经很高了。一些年轻人选择把钱投入基金或者数字货币。不管选择哪种方式，专家建议投资者首先要了解自己能承受多大的风险。", "questions": [{"q": "为什么人们开始寻找其他投资方式？", "opts": ["因为银行关门了", "因为银行利息越来越低", "因为政府不允许存钱", "因为人们不信任银行"], "ans": 1}, {"q": "关于股票市场，文章怎么说？", "opts": ["收益低风险也低", "收益高但风险也大", "没有风险", "已经不存在了"], "ans": 1}, {"q": "专家建议投资者首先要做什么？", "opts": ["立刻买股票", "了解自己能承受多大的风险", "把钱全部存银行", "投资房地产"], "ans": 1}, {"q": "哪种投资曾经最受欢迎？", "opts": ["数字货币", "基金", "股票", "房地产"], "ans": 3}]}, {"text": "全球化使得国际贸易更加频繁。出口和进口对一个国家的经济发展至关重要。当一个国家的出口大于进口时，就会出现贸易顺差；反之则是贸易逆差。贸易顺差意味着更多的外汇收入，而贸易逆差则可能导致本国货币贬值。各国政府通常会通过调整关税来影响贸易平衡。", "questions": [{"q": "什么时候会出现贸易顺差？", "opts": ["进口大于出口时", "出口大于进口时", "进出口相等时", "停止贸易时"], "ans": 1}, {"q": "贸易逆差可能导致什么？", "opts": ["货币升值", "更多的外汇收入", "本国货币贬值", "经济快速增长"], "ans": 2}, {"q": "政府通常用什么方式影响贸易平衡？", "opts": ["关闭港口", "调整关税", "禁止出口", "增加国内消费"], "ans": 1}, {"q": "文章认为什么对经济发展至关重要？", "opts": ["旅游业", "国内消费", "出口和进口", "外国投资"], "ans": 2}, {"q": "全球化对国际贸易有什么影响？", "opts": ["使贸易减少", "使贸易更加频繁", "没有影响", "使贸易停止"], "ans": 1}, {"q": "贸易顺差意味着什么？", "opts": ["更多的外债", "更多的外汇收入", "经济衰退", "货币贬值"], "ans": 1}, {"q": "各国政府调整什么来影响贸易？", "opts": ["工资", "税率", "关税", "汇率"], "ans": 2}, {"q": "全球化使国际贸易变得怎样？", "opts": ["更加困难", "更加频繁", "完全停止", "没有变化"], "ans": 1}]}], "c": [{"words": ["经济", "的", "中国", "发展", "很快"], "answer": "中国的经济发展很快"}, {"words": ["增加", "收入", "了", "他的", "比去年"], "answer": "他的收入比去年增加了"}, {"words": ["太多了", "这个月", "支出", "的"], "answer": "这个月的支出太多了"}, {"words": ["投资", "他", "决定", "房地产"], "answer": "他决定投资房地产"}, {"words": ["受欢迎", "在", "这个产品", "很", "市场上"], "answer": "这个产品在市场上很受欢迎"}, {"words": ["越来越", "市场", "激烈", "竞争"], "answer": "市场竞争越来越激烈"}, {"words": ["按时", "应该", "交税", "每个", "公民"], "answer": "每个公民应该按时交税"}, {"words": ["明年的", "制定了", "公司", "已经", "预算"], "answer": "公司已经制定了明年的预算"}, {"words": ["需要", "大量", "这个项目", "资金"], "answer": "这个项目需要大量资金"}, {"words": ["签了", "双方", "合同", "已经"], "answer": "双方已经签了合同"}]},
2: {"title": "Bab 2: Politik & Masyarakat", "a": [{"q": "政府发布了新的政策。", "opts": ["Pemerintah membatalkan kebijakan.", "Pemerintah mengeluarkan kebijakan baru.", "Rakyat menolak kebijakan.", "Kebijakan lama tetap berlaku."], "ans": 1}, {"q": "每个公民都有选举权。", "opts": ["Hanya orang kaya yang boleh memilih.", "Pemilu sudah dihapuskan.", "Setiap warga negara memiliki hak pilih.", "Anak-anak boleh ikut memilih."], "ans": 2}, {"q": "保护环境是每个人的义务。", "opts": ["Melindungi lingkungan adalah kewajiban setiap orang.", "Hanya pemerintah yang bertanggung jawab atas lingkungan.", "Lingkungan tidak perlu dilindungi.", "Melindungi lingkungan hanya untuk petani."], "ans": 0}, {"q": "男女平等是社会进步的标志。", "opts": ["Laki-laki lebih unggul dari perempuan.", "Kesetaraan gender adalah tanda kemajuan masyarakat.", "Perempuan tidak perlu bekerja.", "Masyarakat tidak perlu kesetaraan."], "ans": 1}, {"q": "经济改革带来了巨大的变化。", "opts": ["Reformasi ekonomi tidak berpengaruh.", "Reformasi ekonomi membawa perubahan besar.", "Ekonomi tidak pernah direformasi.", "Perubahan ekonomi sangat kecil."], "ans": 1}, {"q": "社会稳定是发展的基础。", "opts": ["Stabilitas masyarakat adalah dasar pembangunan.", "Ketidakstabilan mendorong pembangunan.", "Masyarakat tidak membutuhkan stabilitas.", "Pembangunan tidak ada hubungannya dengan stabilitas."], "ans": 0}, {"q": "消除贫困是全球性的目标。", "opts": ["Kemiskinan tidak bisa dihapus.", "Menghapus kemiskinan adalah tujuan global.", "Hanya negara miskin yang peduli kemiskinan.", "Kemiskinan sudah dihapus."], "ans": 1}, {"q": "政府正在严厉打击腐败行为。", "opts": ["Pemerintah mengabaikan korupsi.", "Pemerintah mendukung korupsi.", "Pemerintah sedang memberantas korupsi dengan tegas.", "Korupsi sudah tidak ada lagi."], "ans": 2}, {"q": "任何人都必须遵守法律。", "opts": ["Hanya warga negara yang harus taat hukum.", "Hukum hanya berlaku untuk orang miskin.", "Siapa pun harus mematuhi hukum.", "Hukum bisa diabaikan."], "ans": 2}, {"q": "一个好的领导要关心群众。", "opts": ["Pemimpin tidak perlu peduli rakyat.", "Pemimpin yang baik harus peduli pada rakyat.", "Rakyat harus melayani pemimpin.", "Pemimpin hanya bertanggung jawab pada dirinya."], "ans": 1}, {"q": "这个组织致力于帮助贫困地区。", "opts": ["Organisasi ini berkomitmen membantu daerah miskin.", "Organisasi ini hanya untuk orang kaya.", "Organisasi ini sudah dibubarkan.", "Organisasi ini tidak membantu siapa pun."], "ans": 0}, {"q": "这种社会现象值得我们关注。", "opts": ["Fenomena sosial ini tidak penting.", "Fenomena sosial ini layak kita perhatikan.", "Masyarakat sudah tidak peduli fenomena ini.", "Fenomena ini sudah menghilang."], "ans": 1}, {"q": "每个人都要承担自己的责任。", "opts": ["Tanggung jawab hanya untuk orang dewasa.", "Setiap orang harus menanggung tanggung jawabnya.", "Tidak ada yang perlu bertanggung jawab.", "Pemerintah yang bertanggung jawab atas segalanya."], "ans": 1}, {"q": "言论自由是基本权利之一。", "opts": ["Kebebasan berpendapat bukan hak dasar.", "Kebebasan berpendapat adalah salah satu hak dasar.", "Hanya pemerintah yang boleh berpendapat.", "Kebebasan sudah dihapuskan."], "ans": 1}, {"q": "公司为员工提供了很好的福利。", "opts": ["Perusahaan tidak memberikan tunjangan.", "Karyawan harus membayar sendiri.", "Perusahaan memberikan kesejahteraan yang baik bagi karyawan.", "Hanya manajer yang mendapat tunjangan."], "ans": 2}], "b_paragraphs": [{"text": "在民主社会中，选举是公民表达意愿的重要方式。每个成年公民都有权利参与选举，选出自己认为最合适的领导人。选举的公平公正对维护社会稳定至关重要。为了确保选举的透明度，很多国家都建立了独立的选举监督机构。同时，媒体在选举过程中也发挥着重要的监督作用。", "questions": [{"q": "选举在民主社会中的作用是什么？", "opts": ["让政府控制人民", "让公民表达意愿的重要方式", "增加政府收入", "限制公民自由"], "ans": 1}, {"q": "谁有权利参与选举？", "opts": ["只有政府官员", "只有男性公民", "每个成年公民", "只有有钱人"], "ans": 2}, {"q": "为什么很多国家建立选举监督机构？", "opts": ["为了控制选举结果", "为了确保选举的透明度", "为了限制候选人", "为了增加选举成本"], "ans": 1}]}, {"text": "社会公平是现代社会追求的重要目标。然而，贫富差距在很多国家仍然是一个严重的问题。有些人认为，政府应该通过提高最低工资、完善社会保障制度来缩小贫富差距。也有人认为，教育机会的平等才是解决问题的根本方法。无论采取哪种措施，缩小贫富差距都需要政府和社会的共同努力。", "questions": [{"q": "文章讨论的核心问题是什么？", "opts": ["教育改革", "环境保护", "贫富差距", "国际贸易"], "ans": 2}, {"q": "有些人认为怎样才能缩小贫富差距？", "opts": ["取消所有税收", "降低最低工资", "提高最低工资、完善社保制度", "关闭所有企业"], "ans": 2}, {"q": "也有人认为解决问题的根本方法是什么？", "opts": ["增加军费", "教育机会的平等", "提高房价", "减少人口"], "ans": 1}, {"q": "缩小贫富差距需要谁的努力？", "opts": ["只有政府", "只有企业", "只有个人", "政府和社会共同"], "ans": 3}]}, {"text": "腐败是影响社会公平的重要因素。当政府官员利用职权为自己谋取利益时，受害的是普通百姓。为了打击腐败，很多国家建立了反腐败机构，加强了法律监督。同时，提高政府工作的透明度，让公众参与监督，也是预防腐败的有效方法。只有建立健全的制度，才能从根本上解决腐败问题。", "questions": [{"q": "腐败对社会有什么影响？", "opts": ["促进经济发展", "影响社会公平", "增加就业", "改善教育"], "ans": 1}, {"q": "打击腐败的方法包括什么？", "opts": ["降低官员工资", "建立反腐败机构，加强法律监督", "取消所有政府部门", "增加官员数量"], "ans": 1}, {"q": "预防腐败的有效方法是什么？", "opts": ["减少公众参与", "降低透明度", "提高透明度，让公众监督", "增加官员权力"], "ans": 2}, {"q": "从根本上解决腐败需要什么？", "opts": ["更多的官员", "建立健全的制度", "减少法律", "增加税收"], "ans": 1}, {"q": "谁是腐败的受害者？", "opts": ["政府官员", "外国人", "普通百姓", "企业家"], "ans": 2}, {"q": "很多国家为打击腐败做了什么？", "opts": ["什么都没做", "建立了反腐败机构", "增加了官员福利", "取消了法律"], "ans": 1}, {"q": "提高什么有助于预防腐败？", "opts": ["官员工资", "政府工作的透明度", "税收", "军费"], "ans": 1}, {"q": "文章认为解决腐败的根本方法是什么？", "opts": ["换领导", "建立健全的制度", "增加惩罚", "提高工资"], "ans": 1}]}], "c": [{"words": ["政策", "新的", "发布了", "政府"], "answer": "政府发布了新的政策"}, {"words": ["选举权", "都有", "每个", "公民"], "answer": "每个公民都有选举权"}, {"words": ["法律", "遵守", "必须", "任何人", "都"], "answer": "任何人都必须遵守法律"}, {"words": ["的标志", "是", "社会进步", "男女平等"], "answer": "男女平等是社会进步的标志"}, {"words": ["变化", "带来了", "经济改革", "巨大的"], "answer": "经济改革带来了巨大的变化"}, {"words": ["承担", "每个人", "责任", "都要", "自己的"], "answer": "每个人都要承担自己的责任"}, {"words": ["打击", "正在", "腐败", "政府", "严厉"], "answer": "政府正在严厉打击腐败"}, {"words": ["全球性的", "消除", "目标", "贫困", "是"], "answer": "消除贫困是全球性的目标"}, {"words": ["基础", "是", "社会稳定", "发展的"], "answer": "社会稳定是发展的基础"}, {"words": ["关心", "好的", "要", "领导", "群众"], "answer": "好的领导要关心群众"}]},
3: {"title": "Bab 3: Sains & Penelitian", "a": [{"q": "科学技术改变了人们的生活。", "opts": ["Sains belum memengaruhi kehidupan.", "Kehidupan orang tidak berubah.", "Sains dan teknologi mengubah kehidupan orang.", "Teknologi tidak penting."], "ans": 2}, {"q": "他正在研究新能源技术。", "opts": ["Dia sedang meneliti teknologi energi baru.", "Dia sudah berhenti meneliti.", "Dia tidak tertarik pada energi.", "Dia mengajarkan energi lama."], "ans": 0}, {"q": "理论和实践同样重要。", "opts": ["Teori lebih penting dari praktik.", "Praktik tidak diperlukan.", "Teori dan praktik sama pentingnya.", "Teori tidak berguna."], "ans": 2}, {"q": "根据数据，我们得出了一个结论。", "opts": ["Kami belum punya data.", "Berdasarkan data, kami sampai pada sebuah kesimpulan.", "Data kami salah.", "Kami tidak bisa membuat kesimpulan."], "ans": 1}, {"q": "造纸术是中国古代的四大发明之一。", "opts": ["Kertas ditemukan di Eropa.", "Pembuatan kertas adalah salah satu dari empat penemuan besar Tiongkok kuno.", "Tiongkok hanya punya satu penemuan.", "Kertas bukan penemuan penting."], "ans": 1}, {"q": "科学家发现了一种新的物质。", "opts": ["Ilmuwan gagal menemukan apa pun.", "Ilmuwan menemukan sebuah zat baru.", "Zat itu sudah lama diketahui.", "Ilmuwan menghancurkan zat itu."], "ans": 1}, {"q": "太阳能是一种清洁能源。", "opts": ["Tenaga surya adalah energi kotor.", "Tenaga surya tidak bisa digunakan.", "Tenaga surya adalah jenis energi bersih.", "Tenaga surya sangat mahal."], "ans": 2}, {"q": "人体由无数个细胞组成。", "opts": ["Tubuh manusia hanya punya sedikit sel.", "Tubuh manusia terdiri dari sel yang tak terhitung.", "Sel tidak penting bagi tubuh.", "Tubuh manusia tidak mengandung sel."], "ans": 1}, {"q": "学习是一个漫长的过程。", "opts": ["Belajar bisa selesai dalam satu hari.", "Belajar adalah proses yang panjang.", "Belajar tidak perlu proses.", "Proses belajar sangat singkat."], "ans": 1}, {"q": "实验结果证明了他的假设。", "opts": ["Hasil eksperimen membantah hipotesisnya.", "Eksperimen gagal.", "Hasil eksperimen membuktikan hipotesisnya.", "Dia tidak punya hipotesis."], "ans": 2}, {"q": "他仔细观察了实验现象。", "opts": ["Dia mengabaikan eksperimen.", "Dia mengamati fenomena eksperimen dengan saksama.", "Dia tidak melihat eksperimen.", "Eksperimen tidak terjadi."], "ans": 1}, {"q": "这项研究取得了重要的成果。", "opts": ["Penelitian ini gagal.", "Penelitian ini belum dimulai.", "Penelitian ini mencapai hasil yang penting.", "Penelitian ini tidak berguna."], "ans": 2}, {"q": "大自然有它自己的规律。", "opts": ["Alam tidak memiliki pola.", "Alam memiliki hukumnya sendiri.", "Manusia mengendalikan alam.", "Alam bisa diubah sesuka hati."], "ans": 1}, {"q": "我们需要更多的数据来证明这个理论。", "opts": ["Teori ini sudah terbukti.", "Kita butuh lebih banyak data untuk membuktikan teori ini.", "Data tidak diperlukan.", "Teori ini sudah dibantah."], "ans": 1}, {"q": "研究人员采集了一百个样本。", "opts": ["Peneliti tidak mengumpulkan sampel.", "Peneliti mengumpulkan seratus sampel.", "Sampel tidak diperlukan.", "Hanya satu sampel yang dikumpulkan."], "ans": 1}], "b_paragraphs": [{"text": "人工智能（AI）是近年来发展最快的技术之一。AI可以帮助医生更准确地诊断疾病，帮助科学家分析大量的数据，甚至可以自动驾驶汽车。然而，AI的发展也引起了一些担忧。有人担心AI会取代人类的工作，导致大量失业。也有人担心AI如果不受控制，可能会对人类造成威胁。", "questions": [{"q": "AI可以帮助医生做什么？", "opts": ["做手术", "更准确地诊断疾病", "代替医生", "管理医院"], "ans": 1}, {"q": "人们对AI有什么担忧？", "opts": ["AI太慢了", "AI可能取代人类工作", "AI太贵了", "AI不够聪明"], "ans": 1}, {"q": "AI被认为是什么？", "opts": ["过时的技术", "发展最慢的技术", "发展最快的技术之一", "已经淘汰的技术"], "ans": 2}]}, {"text": "气候变化是当今世界面临的最大挑战之一。科学家通过研究发现，人类活动产生的大量二氧化碳是导致全球变暖的主要原因。冰川融化、海平面上升、极端天气频发都是气候变化的表现。为了应对气候变化，各国签署了《巴黎协定》，承诺减少碳排放。科学家们正在研究新的技术，如碳捕获和清洁能源，希望能减缓气候变化的速度。", "questions": [{"q": "导致全球变暖的主要原因是什么？", "opts": ["火山爆发", "太阳变热", "人类活动产生的大量二氧化碳", "海水温度"], "ans": 2}, {"q": "气候变化的表现包括什么？", "opts": ["天气越来越冷", "冰川增加", "冰川融化、海平面上升", "空气更清洁"], "ans": 2}, {"q": "各国签署《巴黎协定》的目的是什么？", "opts": ["增加贸易", "承诺减少碳排放", "发展核能", "增加石油产量"], "ans": 1}, {"q": "科学家正在研究哪些技术来应对气候变化？", "opts": ["核武器", "碳捕获和清洁能源", "更多的工厂", "更快的汽车"], "ans": 1}]}, {"text": "基因编辑技术是近年来最具争议的科学进展之一。这项技术允许科学家精确地修改生物体的DNA，可以用来治疗遗传性疾病。然而，基因编辑也引发了伦理争议。一些人认为，修改人类基因可能带来不可预知的后果。科学界普遍认为，虽然基因编辑有巨大的医学潜力，但必须在严格的伦理框架下进行。", "questions": [{"q": "基因编辑技术可以做什么？", "opts": ["克隆动物", "精确修改DNA", "创造新物种", "让人长生不老"], "ans": 1}, {"q": "基因编辑引发了什么争议？", "opts": ["经济争议", "政治争议", "伦理争议", "法律争议"], "ans": 2}, {"q": "科学界对基因编辑的态度是什么？", "opts": ["完全反对", "有医学潜力但必须在伦理框架下进行", "随便使用", "只能用于植物"], "ans": 1}, {"q": "基因编辑可以用来治疗什么？", "opts": ["所有疾病", "遗传性疾病", "心理疾病", "外伤"], "ans": 1}, {"q": "为什么有人反对修改人类基因？", "opts": ["太贵了", "可能带来不可预知的后果", "技术太简单", "没有人反对"], "ans": 1}, {"q": "基因编辑技术的特点是什么？", "opts": ["不精确", "只能用于动物", "精确修改生物体的DNA", "已经被禁止"], "ans": 2}, {"q": "科学界认为基因编辑必须在什么条件下进行？", "opts": ["自由条件", "严格的伦理框架", "没有条件", "政府批准"], "ans": 1}, {"q": "基因编辑是近年来最具什么的科学进展？", "opts": ["最具潜力", "最具争议", "最受欢迎", "最便宜"], "ans": 1}]}], "c": [{"words": ["改变了", "科学技术", "人们的", "生活"], "answer": "科学技术改变了人们的生活"}, {"words": ["新能源", "他", "正在", "技术", "研究"], "answer": "他正在研究新能源技术"}, {"words": ["同样", "理论", "重要", "和", "实践"], "answer": "理论和实践同样重要"}, {"words": ["发现了", "科学家", "新的", "一种", "物质"], "answer": "科学家发现了一种新的物质"}, {"words": ["是", "清洁", "太阳能", "能源", "一种"], "answer": "太阳能是一种清洁能源"}, {"words": ["证明了", "实验结果", "假设", "他的"], "answer": "实验结果证明了他的假设"}, {"words": ["规律", "有", "大自然", "自己的", "它"], "answer": "大自然有它自己的规律"}, {"words": ["取得了", "研究", "这项", "重要的", "成果"], "answer": "这项研究取得了重要的成果"}, {"words": ["漫长的", "学习", "是", "过程", "一个"], "answer": "学习是一个漫长的过程"}, {"words": ["采集了", "研究人员", "样本", "一百个"], "answer": "研究人员采集了一百个样本"}]},
4: {"title": "Bab 4: Filsafat & Pemikiran", "a": [{"q": "孔子的思想影响了整个东亚。", "opts": ["Pemikiran Konfusius hanya memengaruhi Tiongkok.", "Pemikiran Konfusius memengaruhi seluruh Asia Timur.", "Konfusius tidak punya pemikiran.", "Asia Timur tidak terpengaruh."], "ans": 1}, {"q": "他的论点缺乏逻辑。", "opts": ["Argumennya sangat logis.", "Argumennya kurang logika.", "Dia tidak punya argumen.", "Logikanya sempurna."], "ans": 1}, {"q": "他没有意识到自己的错误。", "opts": ["Dia menyadari kesalahannya.", "Dia tidak menyadari kesalahannya.", "Dia tidak punya kesalahan.", "Dia memperbaiki kesalahannya."], "ans": 1}, {"q": "我们要看到事物的本质。", "opts": ["Kita harus melihat hakikat suatu hal.", "Kita tidak perlu memahami apa pun.", "Penampilan lebih penting dari hakikat.", "Hakikat tidak ada."], "ans": 0}, {"q": "实践是检验真理的唯一标准。", "opts": ["Teori adalah satu-satunya standar kebenaran.", "Praktik adalah satu-satunya standar untuk menguji kebenaran.", "Kebenaran tidak bisa diuji.", "Standar kebenaran ada banyak."], "ans": 1}, {"q": "他相信命运掌握在自己手中。", "opts": ["Dia percaya nasib ditentukan orang lain.", "Dia percaya nasib ada di tangannya sendiri.", "Dia tidak percaya pada nasib.", "Nasib tidak bisa diubah."], "ans": 1}, {"q": "这个概念太抽象了。", "opts": ["Konsep ini sangat konkret.", "Konsep ini sangat mudah.", "Konsep ini terlalu abstrak.", "Konsep ini tidak ada."], "ans": 2}, {"q": "请给我一个具体的例子。", "opts": ["Tolong beri saya contoh yang abstrak.", "Tolong beri saya contoh yang konkret.", "Contoh tidak diperlukan.", "Contoh terlalu banyak."], "ans": 1}, {"q": "学生们正在进行一场辩论。", "opts": ["Para siswa sedang tidur.", "Para siswa sedang mengadakan debat.", "Debat sudah selesai.", "Siswa menolak berdebat."], "ans": 1}, {"q": "这本书给了我很大的启发。", "opts": ["Buku ini membosankan.", "Buku ini memberi saya inspirasi besar.", "Saya belum membaca buku ini.", "Buku ini tidak berisi apa-apa."], "ans": 1}, {"q": "科学精神就是敢于怀疑。", "opts": ["Ilmuwan tidak boleh meragukan apa pun.", "Semangat ilmiah adalah berani meragukan.", "Meragukan adalah tanda kelemahan.", "Ilmuwan harus percaya segalanya."], "ans": 1}, {"q": "古人留下了许多智慧。", "opts": ["Orang kuno tidak meninggalkan apa pun.", "Orang kuno meninggalkan banyak kebijaksanaan.", "Kebijaksanaan kuno tidak berguna.", "Orang modern lebih bijak."], "ans": 1}, {"q": "艺术是灵魂的语言。", "opts": ["Seni tidak penting.", "Seni adalah bahasa jiwa.", "Jiwa tidak memiliki bahasa.", "Bahasa lebih penting dari seni."], "ans": 1}, {"q": "他是一个有原则的人。", "opts": ["Dia tidak punya prinsip.", "Dia adalah orang yang berprinsip.", "Dia sering berubah pikiran.", "Prinsip tidak penting."], "ans": 1}, {"q": "我们需要对过去进行反思。", "opts": ["Masa lalu tidak perlu dipikirkan.", "Kita perlu melakukan refleksi terhadap masa lalu.", "Masa lalu sudah tidak penting.", "Refleksi adalah buang-buang waktu."], "ans": 1}], "b_paragraphs": [{"text": "孔子是中国历史上最伟大的思想家之一。他提倡'仁'的思想，认为人与人之间应该互相尊重、互相关爱。孔子还强调教育的重要性，他认为每个人都有接受教育的权利，不应该因为贫富而有所区别。孔子的思想不仅影响了中国，还影响了日本、韩国等东亚国家的文化和社会。", "questions": [{"q": "孔子提倡什么思想？", "opts": ["法治", "仁", "战争", "科技"], "ans": 1}, {"q": "孔子对教育有什么看法？", "opts": ["只有富人才能受教育", "教育不重要", "每个人都有受教育的权利", "教育应该被限制"], "ans": 2}, {"q": "孔子的思想影响了哪些地方？", "opts": ["只有中国", "中国和东亚国家", "只有日本", "全世界每个国家"], "ans": 1}]}, {"text": "中国古代哲学包含了丰富的智慧。道家强调顺应自然，认为人不应该过度干预自然规律。儒家则强调社会秩序和人际关系的和谐。佛教传入中国后，提出了'空'和'无常'的概念，影响了中国人对生死和命运的看法。这三种思想虽然侧重不同，但都追求人与自然、人与社会之间的和谐。", "questions": [{"q": "道家强调什么？", "opts": ["战争", "竞争", "顺应自然", "财富"], "ans": 2}, {"q": "儒家关注的重点是什么？", "opts": ["自然规律", "社会秩序和人际关系", "生死问题", "科学研究"], "ans": 1}, {"q": "三种思想的共同追求是什么？", "opts": ["财富和权力", "和谐", "战争胜利", "科技发展"], "ans": 1}, {"q": "佛教提出了什么概念？", "opts": ["仁和义", "空和无常", "道和德", "法和理"], "ans": 1}]}, {"text": "西方哲学和东方哲学有很多不同之处。西方哲学强调理性和逻辑，追求对世界的客观认识。东方哲学则更注重直觉和体验，追求内心的平静和与自然的和谐。然而，在全球化的今天，东西方哲学正在不断交流和融合。越来越多的人开始从两种传统中汲取智慧，形成更加丰富的世界观。", "questions": [{"q": "西方哲学强调什么？", "opts": ["直觉和体验", "理性和逻辑", "宗教信仰", "战争哲学"], "ans": 1}, {"q": "东方哲学追求什么？", "opts": ["物质财富", "权力", "内心平静和与自然的和谐", "科学真理"], "ans": 2}, {"q": "在全球化背景下，东西方哲学怎样了？", "opts": ["完全分离", "正在交流和融合", "互相排斥", "已经消失"], "ans": 1}, {"q": "人们从两种传统中汲取什么？", "opts": ["财富", "权力", "智慧", "技术"], "ans": 2}, {"q": "西方哲学追求什么样的认识？", "opts": ["主观认识", "客观认识", "模糊认识", "宗教认识"], "ans": 1}, {"q": "东方哲学更注重什么？", "opts": ["逻辑推理", "数据分析", "直觉和体验", "法律制度"], "ans": 2}, {"q": "全球化对哲学有什么影响？", "opts": ["使哲学消失", "促进东西方交流融合", "没有影响", "使西方哲学统治世界"], "ans": 1}, {"q": "越来越多的人形成什么样的世界观？", "opts": ["狭隘的", "更加丰富的", "悲观的", "西方的"], "ans": 1}]}], "c": [{"words": ["思想", "影响了", "孔子的", "整个", "东亚"], "answer": "孔子的思想影响了整个东亚"}, {"words": ["缺乏", "他的", "逻辑", "论点"], "answer": "他的论点缺乏逻辑"}, {"words": ["掌握", "命运", "自己", "在", "手中"], "answer": "命运掌握在自己手中"}, {"words": ["太", "这个", "抽象了", "概念"], "answer": "这个概念太抽象了"}, {"words": ["唯一标准", "实践", "检验", "是", "真理的"], "answer": "实践是检验真理的唯一标准"}, {"words": ["进行", "学生们", "辩论", "正在", "一场"], "answer": "学生们正在进行一场辩论"}, {"words": ["启发", "给了", "这本书", "我", "很大的"], "answer": "这本书给了我很大的启发"}, {"words": ["留下了", "古人", "许多", "智慧"], "answer": "古人留下了许多智慧"}, {"words": ["本质", "要", "我们", "事物的", "看到"], "answer": "我们要看到事物的本质"}, {"words": ["反思", "需要", "过去", "我们", "对", "进行"], "answer": "我们需要对过去进行反思"}]},
5: {"title": "Bab 5: Media & Jurnalisme", "a": [{"q": "社交媒体对年轻人影响很大。", "opts": ["Media sosial tidak berpengaruh.", "Media sosial sangat memengaruhi anak muda.", "Anak muda tidak menggunakan media sosial.", "Media sosial hanya untuk orang tua."], "ans": 1}, {"q": "记者正在现场报道新闻。", "opts": ["Wartawan sedang meliput berita di lokasi.", "Wartawan sedang tidur.", "Berita tidak diliput.", "Wartawan sudah pulang."], "ans": 0}, {"q": "这篇报道引起了广泛关注。", "opts": ["Liputan ini tidak ada yang membaca.", "Liputan ini menarik perhatian luas.", "Liputan ini sudah dihapus.", "Liputan ini sangat membosankan."], "ans": 1}, {"q": "我们要学会辨别虚假信息。", "opts": ["Semua informasi di internet benar.", "Kita harus belajar membedakan informasi palsu.", "Informasi palsu tidak berbahaya.", "Tidak perlu memeriksa informasi."], "ans": 1}, {"q": "互联网加快了信息的传播。", "opts": ["Internet memperlambat penyebaran informasi.", "Internet mempercepat penyebaran informasi.", "Internet tidak memengaruhi informasi.", "Informasi tidak menyebar melalui internet."], "ans": 1}, {"q": "舆论对政策制定有很大影响。", "opts": ["Opini publik tidak berpengaruh pada kebijakan.", "Opini publik sangat memengaruhi pembuatan kebijakan.", "Pemerintah mengabaikan opini publik.", "Opini publik tidak penting."], "ans": 1}, {"q": "他的新书下个月出版。", "opts": ["Buku barunya terbit bulan depan.", "Buku lamanya diterbitkan ulang.", "Dia tidak menulis buku.", "Bukunya sudah terbit tahun lalu."], "ans": 0}, {"q": "编辑认为这篇稿子需要修改。", "opts": ["Editor menganggap naskah ini sempurna.", "Editor menganggap naskah ini perlu direvisi.", "Naskah sudah diterbitkan.", "Editor tidak membaca naskah."], "ans": 1}, {"q": "很多年轻人喜欢看直播。", "opts": ["Anak muda tidak suka siaran langsung.", "Banyak anak muda suka menonton siaran langsung.", "Siaran langsung sudah tidak ada.", "Hanya orang tua yang nonton siaran langsung."], "ans": 1}, {"q": "新闻报道必须真实。", "opts": ["Berita boleh palsu.", "Liputan berita harus nyata.", "Kebenaran tidak penting dalam berita.", "Berita hanya hiburan."], "ans": 1}, {"q": "未经许可不能侵犯他人的版权。", "opts": ["Hak cipta tidak penting.", "Tidak boleh melanggar hak cipta orang lain tanpa izin.", "Siapa pun boleh menyalin karya orang lain.", "Hak cipta sudah dihapuskan."], "ans": 1}, {"q": "网络新闻越来越受欢迎。", "opts": ["Berita internet semakin populer.", "Berita internet semakin ditinggalkan.", "Tidak ada berita di internet.", "Berita cetak lebih populer dari internet."], "ans": 0}, {"q": "记者采访了那位科学家。", "opts": ["Wartawan mewawancarai ilmuwan itu.", "Ilmuwan menolak diwawancarai.", "Wartawan tidak bertemu ilmuwan.", "Wawancara dibatalkan."], "ans": 0}, {"q": "公司发布了一份新的声明。", "opts": ["Perusahaan menarik pernyataannya.", "Perusahaan merilis pernyataan baru.", "Perusahaan tidak mengatakan apa pun.", "Pernyataan itu palsu."], "ans": 1}, {"q": "这个节目有几百万观众。", "opts": ["Program ini tidak ada penontonnya.", "Program ini memiliki jutaan penonton.", "Program ini sudah dihentikan.", "Hanya sepuluh orang yang menonton."], "ans": 1}], "b_paragraphs": [{"text": "社交媒体改变了人们获取新闻的方式。过去，人们主要通过报纸和电视获取信息。现在，越来越多的人通过社交媒体了解世界。虽然社交媒体让信息传播更快，但也带来了虚假新闻的问题。很多人不加辨别地转发未经核实的消息，导致谣言快速传播。因此，提高公众的媒体素养变得越来越重要。", "questions": [{"q": "过去人们主要通过什么获取新闻？", "opts": ["社交媒体", "报纸和电视", "朋友口述", "广播"], "ans": 1}, {"q": "社交媒体带来了什么问题？", "opts": ["信息太少", "虚假新闻", "网速太慢", "广告太多"], "ans": 1}, {"q": "文章认为什么变得越来越重要？", "opts": ["使用更多社交媒体", "提高公众的媒体素养", "关闭社交媒体", "只看报纸"], "ans": 1}]}, {"text": "在信息爆炸的时代，如何辨别真假新闻成为每个人必须面对的问题。专家建议，首先要检查新闻来源是否可靠，优先选择权威媒体的报道。其次，要注意新闻是否有具体的时间、地点和人物信息。最后，如果一条消息让你非常惊讶或愤怒，更要谨慎核实，因为很多虚假信息就是利用人们的情绪来传播的。", "questions": [{"q": "专家建议首先要检查什么？", "opts": ["阅读量", "新闻来源是否可靠", "评论数量", "发布时间"], "ans": 1}, {"q": "要注意新闻是否有什么信息？", "opts": ["图片和视频", "广告和赞助", "具体的时间、地点和人物", "转发量"], "ans": 2}, {"q": "什么样的消息更要谨慎核实？", "opts": ["无聊的消息", "让人惊讶或愤怒的消息", "关于天气的消息", "体育新闻"], "ans": 1}, {"q": "虚假信息利用什么来传播？", "opts": ["先进技术", "人们的情绪", "政府支持", "高价广告"], "ans": 1}]}, {"text": "记者的职业道德在新闻行业中至关重要。一个合格的记者应该坚持真实报道，不夸大事实，也不隐瞒重要信息。同时，记者要保护消息来源的隐私，尊重被采访者的权利。在追求新闻速度的同时，不能牺牲报道的准确性。随着自媒体的兴起，传统记者面临着越来越多的挑战，但专业、客观、准确的报道仍然是新闻的核心价值。", "questions": [{"q": "合格的记者应该怎么做？", "opts": ["夸大事实", "坚持真实报道", "只报道好消息", "隐瞒信息"], "ans": 1}, {"q": "记者要保护什么？", "opts": ["自己的隐私", "消息来源的隐私", "政府的秘密", "公司的利润"], "ans": 1}, {"q": "文章认为新闻的核心价值是什么？", "opts": ["速度最重要", "流量最重要", "专业、客观、准确的报道", "娱乐性"], "ans": 2}, {"q": "传统记者面临什么挑战？", "opts": ["工资太低", "自媒体的兴起", "没有新闻可报", "技术太难"], "ans": 1}, {"q": "记者不应该牺牲什么？", "opts": ["新闻速度", "报道的准确性", "读者数量", "广告收入"], "ans": 1}, {"q": "记者应该尊重谁的权利？", "opts": ["广告商", "被采访者", "竞争对手", "政府官员"], "ans": 1}, {"q": "自媒体对传统记者有什么影响？", "opts": ["没有影响", "带来了更多挑战", "让记者更轻松", "完全取代了记者"], "ans": 1}, {"q": "什么在新闻行业中至关重要？", "opts": ["流量", "记者的职业道德", "广告收入", "娱乐性"], "ans": 1}]}], "c": [{"words": ["影响", "社交媒体", "年轻人", "很大", "对"], "answer": "社交媒体对年轻人影响很大"}, {"words": ["虚假信息", "辨别", "要", "我们", "学会"], "answer": "我们要学会辨别虚假信息"}, {"words": ["信息", "加快了", "互联网", "的", "传播"], "answer": "互联网加快了信息的传播"}, {"words": ["报道", "新闻", "必须", "真实"], "answer": "新闻报道必须真实"}, {"words": ["受欢迎", "网络新闻", "越来越"], "answer": "网络新闻越来越受欢迎"}, {"words": ["出版", "下个月", "他的", "新书"], "answer": "他的新书下个月出版"}, {"words": ["需要", "这篇", "修改", "稿子"], "answer": "这篇稿子需要修改"}, {"words": ["引起了", "广泛", "这篇", "关注", "报道"], "answer": "这篇报道引起了广泛关注"}, {"words": ["采访了", "记者", "科学家", "那位"], "answer": "记者采访了那位科学家"}, {"words": ["喜欢", "年轻人", "看", "直播", "很多"], "answer": "很多年轻人喜欢看直播"}]},

eh punya pengacara.", "Terdakwa berhak meminta pengacara.", "Hanya penggugat yang boleh punya pengacara.", "Pengacara dilarang di pengadilan."], "ans": 1}, {"q": "知识产权受法律保护。", "opts": ["Hak kekayaan intelektual tidak dilindungi.", "Hak kekayaan intelektual dilindungi hukum.", "Hanya hak paten yang dilindungi.", "Hukum tidak mengatur kekayaan intelektual."], "ans": 1}, {"q": "陪审团一致认为他无罪。", "opts": ["Juri memutuskan dia bersalah.", "Juri dengan suara bulat menyatakan dia tidak bersalah.", "Juri tidak bisa memutuskan.", "Juri dibubarkan."], "ans": 1}, {"q": "这个地区的治安最近改善了很多。", "opts": ["Keamanan daerah ini memburuk.", "Keamanan daerah ini belakangan ini sangat membaik.", "Daerah ini tidak aman.", "Polisi meninggalkan daerah ini."], "ans": 1}, {"q": "违反交通规则要接受处罚。", "opts": ["Melanggar aturan lalu lintas akan dihukum.", "Aturan lalu lintas tidak penting.", "Pelanggaran lalu lintas tidak ada hukumannya.", "Hanya sopir truk yang dihukum."], "ans": 0}], "b_paragraphs": [{"text": "学习任何技能都需要时间和耐心。很多人在开始学习的时候充满热情，但过了一段时间就会感到枯燥无味。专家建议，学习者应该设定合理的目标，每天坚持练习，同时要学会享受学习的过程。只有这样，才能真正掌握一项技能。此外，找到适合自己的学习方法也非常重要。", "questions": [{"q": "很多人学习一段时间后会怎样？", "opts": ["更加热情", "感到枯燥无味", "立刻成功", "放弃工作"], "ans": 1}, {"q": "专家建议学习者应该怎么做？", "opts": ["不设目标", "每天坚持练习", "只学一天", "不享受过程"], "ans": 1}, {"q": "文章认为什么也很重要？", "opts": ["找老师", "花很多钱", "找到适合自己的学习方法", "去国外"], "ans": 2}]}, {"text": "随着城市化的发展，越来越多的人从农村搬到了城市。城市提供了更多的就业机会和更好的教育资源，但也带来了交通拥堵、环境污染等问题。为了解决这些问题，很多城市开始建设绿色交通系统，推广公共交通，鼓励市民骑自行车或步行。同时，城市绿化也得到了更多的重视。", "questions": [{"q": "人们为什么搬到城市？", "opts": ["城市空气好", "更多就业机会和教育资源", "城市房子便宜", "农村太热"], "ans": 1}, {"q": "城市化带来了什么问题？", "opts": ["就业减少", "交通拥堵和环境污染", "人口减少", "教育水平下降"], "ans": 1}, {"q": "城市怎么解决交通问题？", "opts": ["禁止开车", "建设绿色交通系统", "关闭道路", "增加停车场"], "ans": 1}, {"q": "城市还重视什么？", "opts": ["建更多工厂", "城市绿化", "减少公园", "增加汽车"], "ans": 1}]}, {"text": "科技的进步深刻地改变了我们的日常生活。智能手机让我们可以随时随地获取信息、与朋友联系。网上购物使我们不用出门就能买到需要的东西。然而，过度依赖科技也有负面影响，比如减少了面对面的交流，影响了睡眠质量。因此，我们需要合理使用科技产品，保持健康的生活方式。", "questions": [{"q": "智能手机让我们可以做什么？", "opts": ["只能打电话", "随时随地获取信息", "做饭", "开车"], "ans": 1}, {"q": "过度依赖科技有什么负面影响？", "opts": ["让人更聪明", "减少面对面交流", "增加收入", "改善睡眠"], "ans": 1}, {"q": "文章建议我们怎么做？", "opts": ["完全不用科技", "合理使用科技产品", "只用手机", "买更多设备"], "ans": 1}, {"q": "网上购物的好处是什么？", "opts": ["价格更贵", "不用出门就能买东西", "只能买食物", "需要去商店取货"], "ans": 1}, {"q": "文章的主要观点是什么？", "opts": ["科技只有好处", "科技只有坏处", "要合理使用科技", "应该远离科技"], "ans": 2}, {"q": "科技影响了什么质量？", "opts": ["工作质量", "空气质量", "睡眠质量", "食物质量"], "ans": 2}, {"q": "文章提到了几种科技应用？", "opts": ["一种", "两种", "三种", "四种"], "ans": 1}, {"q": "我们需要保持什么？", "opts": ["更多设备", "健康的生活方式", "更长的工作时间", "更多的手机"], "ans": 1}]}], "c": [{"words": ["需要", "时间", "学习", "和", "耐心"], "answer": "学习需要时间和耐心"}, {"words": ["应该", "我们", "环境", "保护"], "answer": "我们应该保护环境"}, {"words": ["重要", "很", "对", "健康", "运动"], "answer": "运动对健康很重要"}, {"words": ["越来越", "受到", "关注", "这个问题"], "answer": "这个问题越来越受到关注"}, {"words": ["帮助", "科技", "了", "改变", "生活", "人们的"], "answer": "科技帮助改变了人们的生活"}, {"words": ["坚持", "才能", "只有", "成功"], "answer": "只有坚持才能成功"}, {"words": ["合理", "要", "时间", "安排"], "answer": "要合理安排时间"}, {"words": ["责任", "每个人", "的", "都有", "自己的"], "answer": "每个人都有自己的责任"}, {"words": ["影响", "对", "有", "社会", "很大的"], "answer": "对社会有很大的影响"}, {"words": ["发展", "经济", "是", "基础", "教育", "的"], "answer": "教育是经济发展的基础"}]},

"ans": 1}, {"q": "城市还重视什么？", "opts": ["建更多工厂", "城市绿化", "减少公园", "增加汽车"], "ans": 1}]}, {"text": "科技的进步深刻地改变了我们的日常生活。智能手机让我们可以随时随地获取信息、与朋友联系。网上购物使我们不用出门就能买到需要的东西。然而，过度依赖科技也有负面影响，比如减少了面对面的交流，影响了睡眠质量。因此，我们需要合理使用科技产品，保持健康的生活方式。", "questions": [{"q": "智能手机让我们可以做什么？", "opts": ["只能打电话", "随时随地获取信息", "做饭", "开车"], "ans": 1}, {"q": "过度依赖科技有什么负面影响？", "opts": ["让人更聪明", "减少面对面交流", "增加收入", "改善睡眠"], "ans": 1}, {"q": "文章建议我们怎么做？", "opts": ["完全不用科技", "合理使用科技产品", "只用手机", "买更多设备"], "ans": 1}, {"q": "网上购物的好处是什么？", "opts": ["价格更贵", "不用出门就能买东西", "只能买食物", "需要去商店取货"], "ans": 1}, {"q": "文章的主要观点是什么？", "opts": ["科技只有好处", "科技只有坏处", "要合理使用科技", "应该远离科技"], "ans": 2}, {"q": "科技影响了什么质量？", "opts": ["工作质量", "空气质量", "睡眠质量", "食物质量"], "ans": 2}, {"q": "文章提到了几种科技应用？", "opts": ["一种", "两种", "三种", "四种"], "ans": 1}, {"q": "我们需要保持什么？", "opts": ["更多设备", "健康的生活方式", "更长的工作时间", "更多的手机"], "ans": 1}]}], "c": [{"words": ["需要", "时间", "学习", "和", "耐心"], "answer": "学习需要时间和耐心"}, {"words": ["应该", "我们", "环境", "保护"], "answer": "我们应该保护环境"}, {"words": ["重要", "很", "对", "健康", "运动"], "answer": "运动对健康很重要"}, {"words": ["越来越", "受到", "关注", "这个问题"], "answer": "这个问题越来越受到关注"}, {"words": ["帮助", "科技", "了", "改变", "生活", "人们的"], "answer": "科技帮助改变了人们的生活"}, {"words": ["坚持", "才能", "只有", "成功"], "answer": "只有坚持才能成功"}, {"words": ["合理", "要", "时间", "安排"], "answer": "要合理安排时间"}, {"words": ["责任", "每个人", "的", "都有", "自己的"], "answer": "每个人都有自己的责任"}, {"words": ["影响", "对", "有", "社会", "很大的"], "answer": "对社会有很大的影响"}, {"words": ["发展", "经济", "是", "基础", "教育", "的"], "answer": "教育是经济发展的基础"}]},

们为什么搬到城市？", "opts": ["城市空气好", "更多就业机会和教育资源", "城市房子便宜", "农村太热"], "ans": 1}, {"q": "城市化带来了什么问题？", "opts": ["就业减少", "交通拥堵和环境污染", "人口减少", "教育水平下降"], "ans": 1}, {"q": "城市怎么解决交通问题？", "opts": ["禁止开车", "建设绿色交通系统", "关闭道路", "增加停车场"], "ans": 1}, {"q": "城市还重视什么？", "opts": ["建更多工厂", "城市绿化", "减少公园", "增加汽车"], "ans": 1}]}, {"text": "科技的进步深刻地改变了我们的日常生活。智能手机让我们可以随时随地获取信息、与朋友联系。网上购物使我们不用出门就能买到需要的东西。然而，过度依赖科技也有负面影响，比如减少了面对面的交流，影响了睡眠质量。因此，我们需要合理使用科技产品，保持健康的生活方式。", "questions": [{"q": "智能手机让我们可以做什么？", "opts": ["只能打电话", "随时随地获取信息", "做饭", "开车"], "ans": 1}, {"q": "过度依赖科技有什么负面影响？", "opts": ["让人更聪明", "减少面对面交流", "增加收入", "改善睡眠"], "ans": 1}, {"q": "文章建议我们怎么做？", "opts": ["完全不用科技", "合理使用科技产品", "只用手机", "买更多设备"], "ans": 1}, {"q": "网上购物的好处是什么？", "opts": ["价格更贵", "不用出门就能买东西", "只能买食物", "需要去商店取货"], "ans": 1}, {"q": "文章的主要观点是什么？", "opts": ["科技只有好处", "科技只有坏处", "要合理使用科技", "应该远离科技"], "ans": 2}, {"q": "科技影响了什么质量？", "opts": ["工作质量", "空气质量", "睡眠质量", "食物质量"], "ans": 2}, {"q": "文章提到了几种科技应用？", "opts": ["一种", "两种", "三种", "四种"], "ans": 1}, {"q": "我们需要保持什么？", "opts": ["更多设备", "健康的生活方式", "更长的工作时间", "更多的手机"], "ans": 1}]}], "c": [{"words": ["需要", "时间", "学习", "和", "耐心"], "answer": "学习需要时间和耐心"}, {"words": ["应该", "我们", "环境", "保护"], "answer": "我们应该保护环境"}, {"words": ["重要", "很", "对", "健康", "运动"], "answer": "运动对健康很重要"}, {"words": ["越来越", "受到", "关注", "这个问题"], "answer": "这个问题越来越受到关注"}, {"words": ["帮助", "科技", "了", "改变", "生活", "人们的"], "answer": "科技帮助改变了人们的生活"}, {"words": ["坚持", "才能", "只有", "成功"], "answer": "只有坚持才能成功"}, {"words": ["合理", "要", "时间", "安排"], "answer": "要合理安排时间"}, {"words": ["责任", "每个人", "的", "都有", "自己的"], "answer": "每个人都有自己的责任"}, {"words": ["影响", "对", "有", "社会", "很大的"], "answer": "对社会有很大的影响"}, {"words": ["发展", "经济", "是", "基础", "教育", "的"], "answer": "教育是经济发展的基础"}]},

的交流，影响了睡眠质量。因此，我们需要合理使用科技产品，保持健康的生活方式。", "questions": [{"q": "智能手机让我们可以做什么？", "opts": ["只能打电话", "随时随地获取信息", "做饭", "开车"], "ans": 1}, {"q": "过度依赖科技有什么负面影响？", "opts": ["让人更聪明", "减少面对面交流", "增加收入", "改善睡眠"], "ans": 1}, {"q": "文章建议我们怎么做？", "opts": ["完全不用科技", "合理使用科技产品", "只用手机", "买更多设备"], "ans": 1}, {"q": "网上购物的好处是什么？", "opts": ["价格更贵", "不用出门就能买东西", "只能买食物", "需要去商店取货"], "ans": 1}, {"q": "文章的主要观点是什么？", "opts": ["科技只有好处", "科技只有坏处", "要合理使用科技", "应该远离科技"], "ans": 2}, {"q": "科技影响了什么质量？", "opts": ["工作质量", "空气质量", "睡眠质量", "食物质量"], "ans": 2}, {"q": "文章提到了几种科技应用？", "opts": ["一种", "两种", "三种", "四种"], "ans": 1}, {"q": "我们需要保持什么？", "opts": ["更多设备", "健康的生活方式", "更长的工作时间", "更多的手机"], "ans": 1}]}], "c": [{"words": ["需要", "时间", "学习", "和", "耐心"], "answer": "学习需要时间和耐心"}, {"words": ["应该", "我们", "环境", "保护"], "answer": "我们应该保护环境"}, {"words": ["重要", "很", "对", "健康", "运动"], "answer": "运动对健康很重要"}, {"words": ["越来越", "受到", "关注", "这个问题"], "answer": "这个问题越来越受到关注"}, {"words": ["帮助", "科技", "了", "改变", "生活", "人们的"], "answer": "科技帮助改变了人们的生活"}, {"words": ["坚持", "才能", "只有", "成功"], "answer": "只有坚持才能成功"}, {"words": ["合理", "要", "时间", "安排"], "answer": "要合理安排时间"}, {"words": ["责任", "每个人", "的", "都有", "自己的"], "answer": "每个人都有自己的责任"}, {"words": ["影响", "对", "有", "社会", "很大的"], "answer": "对社会有很大的影响"}, {"words": ["发展", "经济", "是", "基础", "教育", "的"], "answer": "教育是经济发展的基础"}]},

            });
            html+='</div></div>';
        });

        // Bagian B
        html+='<div class="bagian-title">📖 Bagian B: Baca Paragraf & Jawab (15 Soal)</div>';
        let bCount=0;
        data.b_paragraphs.forEach((p,pi)=>{
            html+='<div class="paragraph-box">'+p.text+'</div>';
            p.questions.forEach((q,qi)=>{
                html+='<div class="soal-card" id="bab'+n+'-b-'+bCount+'">';
                html+='<div class="soal-text"><span class="soal-num">'+(bCount+16)+'.</span> '+q.q+'</div>';
                html+='<div class="options">';
                q.opts.forEach((o,j)=>{
                    html+='<button class="opt-btn" data-bab="'+n+'" data-bagian="b" data-soal="'+bCount+'" data-opt="'+j+'" onclick="selectOpt(this)">'+String.fromCharCode(65+j)+'. '+o+'</button>';
                });
                html+='</div></div>';
                bCount++;
            });
        });

        // Bagian C
        html+='<div class="bagian-title">🔀 Bagian C: Susun Kalimat (10 Soal)</div>';
        data.c.forEach((q,i)=>{
            html+='<div class="soal-card" id="bab'+n+'-c-'+i+'">';
            html+='<div class="soal-text"><span class="soal-num">'+(i+31)+'.</span> Susun kata berikut menjadi kalimat yang benar:</div>';
            html+='<div class="arrange-box">';
            html+='<div class="answer-area" id="ans-'+n+'-'+i+'"></div>';
            // Shuffle words
            let words=[...q.words];
            for(let x=words.length-1;x>0;x--){let y=Math.floor(Math.random()*(x+1));[words[x],words[y]]=[words[y],words[x]];}
            html+='<div class="arrange-words" id="words-'+n+'-'+i+'">';
            words.forEach((w,wi)=>{
                html+='<span class="word-chip" data-bab="'+n+'" data-soal="'+i+'" data-word="'+w+'" onclick="addWord(this)">'+w+'</span>';
            });
            html+='</div></div></div>';
        });

        // Buttons
        html+='<div style="text-align:center;margin:24px 0">';
        html+='<button class="check-btn" onclick="checkBab('+n+')">✅ Periksa Jawaban</button>';
        html+='<button class="reset-btn" onclick="resetBab('+n+')">🔄 Reset</button>';
        html+='</div>';
        html+='<div class="score-box" id="score-'+n+'" style="display:none"><div class="score" id="score-val-'+n+'"></div><div id="score-text-'+n+'"></div></div>';
        html+='<button class="kunci-toggle" onclick="toggleKunci('+n+')">🔑 Lihat Kunci Jawaban</button>';
        html+='<div class="kunci-box" id="kunci-'+n+'">';
        // Generate answer key
        html+='<h4>Bagian A:</h4>';
        data.a.forEach((q,i)=>{ html+='<div class="kunci-item">'+(i+1)+'. <span class="correct">'+String.fromCharCode(65+q.ans)+'</span></div>'; });
        html+='<h4>Bagian B:</h4>';
        let bIdx=0;
        data.b_paragraphs.forEach(p=>{
            p.questions.forEach(q=>{
                html+='<div class="kunci-item">'+(bIdx+16)+'. <span class="correct">'+String.fromCharCode(65+q.ans)+'</span></div>';
                bIdx++;
            });
        });
        html+='<h4>Bagian C:</h4>';
        data.c.forEach((q,i)=>{ html+='<div class="kunci-item">'+(i+31)+'. <span class="correct">'+q.answer+'</span></div>'; });
        html+='</div>';
        html+='</div>';
        allBab.innerHTML=html;
    }

    // Selection handlers
    const userAnswers={};

    function selectOpt(btn){
        const bab=btn.dataset.bab, bagian=btn.dataset.bagian, soal=btn.dataset.soal, opt=parseInt(btn.dataset.opt);
        const key=bab+'-'+bagian+'-'+soal;
        userAnswers[key]=opt;
        // Clear other selections in same question
        document.querySelectorAll('.opt-btn[data-bab="'+bab+'"][data-bagian="'+bagian+'"][data-soal="'+soal+'"]').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function addWord(chip){
        const bab=chip.dataset.bab, soal=chip.dataset.soal, word=chip.dataset.word;
        chip.classList.add('used');
        const area=document.getElementById('ans-'+bab+'-'+soal);
        const ac=document.createElement('span');
        ac.className='answer-chip';
        ac.textContent=word;
        ac.onclick=function(){
            area.removeChild(ac);
            chip.classList.remove('used');
        };
        area.appendChild(ac);
    }

    function checkBab(n){
        const data=SOAL_DATA[n];
        let correct=0, total=40;

        // Check A
        data.a.forEach((q,i)=>{
            const key=n+'-a-'+i;
            const card=document.getElementById('bab'+n+'-a-'+i);
            if(userAnswers[key]===q.ans){correct++;card.classList.add('correct');card.classList.remove('wrong');}
            else{card.classList.add('wrong');card.classList.remove('correct');}
            // Highlight correct
            document.querySelectorAll('.opt-btn[data-bab="'+n+'"][data-bagian="a"][data-soal="'+i+'"]').forEach(b=>{
                if(parseInt(b.dataset.opt)===q.ans)b.classList.add('correct-answer');
                else if(parseInt(b.dataset.opt)===userAnswers[key]&&userAnswers[key]!==q.ans)b.classList.add('wrong-answer');
            });
        });

        // Check B
        let bIdx=0;
        data.b_paragraphs.forEach(p=>{
            p.questions.forEach(q=>{
                const key=n+'-b-'+bIdx;
                const card=document.getElementById('bab'+n+'-b-'+bIdx);
                if(userAnswers[key]===q.ans){correct++;card.classList.add('correct');card.classList.remove('wrong');}
                else{card.classList.add('wrong');card.classList.remove('correct');}
                document.querySelectorAll('.opt-btn[data-bab="'+n+'"][data-bagian="b"][data-soal="'+bIdx+'"]').forEach(b=>{
                    if(parseInt(b.dataset.opt)===q.ans)b.classList.add('correct-answer');
                    else if(parseInt(b.dataset.opt)===userAnswers[key]&&userAnswers[key]!==q.ans)b.classList.add('wrong-answer');
                });
                bIdx++;
            });
        });

        // Check C
        data.c.forEach((q,i)=>{
            const area=document.getElementById('ans-'+n+'-'+i);
            const chips=area.querySelectorAll('.answer-chip');
            const userAns=Array.from(chips).map(c=>c.textContent).join('');
            const card=document.getElementById('bab'+n+'-c-'+i);
            if(userAns===q.answer){correct++;card.classList.add('correct');card.classList.remove('wrong');}
            else{card.classList.add('wrong');card.classList.remove('correct');}
        });

        // Show score
        const scoreBox=document.getElementById('score-'+n);
        scoreBox.style.display='block';
        document.getElementById('score-val-'+n).textContent=correct+'/'+total;
        const pct=Math.round(correct/total*100);
        let msg=pct>=90?'🏆 Luar biasa!':pct>=70?'👍 Bagus sekali!':pct>=50?'💪 Cukup baik, terus berlatih!':'📚 Perlu belajar lagi, semangat!';
        document.getElementById('score-text-'+n).textContent=msg+' ('+pct+'%)';
        scoreBox.scrollIntoView({behavior:'smooth'});
    }

    function resetBab(n){
        // Clear answers
        Object.keys(userAnswers).forEach(k=>{if(k.startsWith(n+'-'))delete userAnswers[k];});
        document.getElementById('score-'+n).style.display='none';
        document.getElementById('kunci-'+n).classList.remove('show');
        renderBab(n);
    }

    function toggleKunci(n){
        document.getElementById('kunci-'+n).classList.toggle('show');
    }

    // Back to top
    const topBtn=document.createElement('button');
    topBtn.innerHTML='⬆';
    topBtn.style.cssText='position:fixed;bottom:30px;right:30px;width:48px;height:48px;border-radius:50%;background:#1890ff;color:#fff;border:none;font-size:20px;cursor:pointer;display:none;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.15)';
    topBtn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
    document.body.appendChild(topBtn);
    window.addEventListener('scroll',()=>{topBtn.style.display=window.scrollY>300?'block':'none';});

    // Show Bab 1 on load
    showBab(1);

    </script>
</body>
</html>
