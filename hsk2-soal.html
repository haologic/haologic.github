{q:"他觉得大学生活怎么样？",o:["忙碌又充实","很无聊","太轻松","太难了"],a:0}
]}

{words:["说","请","慢","一点"],answer:"请说慢一点"},

{words:["正在","他","看","书"],answer:"他正在看书"},

// Build babs 6-20
for(let i=0;i<BAB_TEMPLATES.length;i++){
    const b = BAB_TEMPLATES[i];

for(let i=0;i<MORE_BABS.length;i++){

// Render
const babNav = document.getElementById('babNav');
const babCont = document.getElementById('babContainer');

BABS.forEach((bab,bi)=>{
    // nav button
    const btn = document.createElement('button');
    btn.className = 'bab-btn' + (bi===0?' active':'');
    btn.textContent = 'Bab '+(bi+1);
    btn.onclick = ()=>{
        document.querySelectorAll('.bab-btn').forEach(b=>b.classList.remove('active'));
        document.querySelectorAll('.bab-content').forEach(c=>c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('bab'+bi).classList.add('active');
    };
    babNav.appendChild(btn);

    // content
    const div = document.createElement('div');
    div.id = 'bab'+bi;
    div.className = 'bab-content'+(bi===0?' active':'');

    let html = '<h2>'+bab.title+'</h2>';

    // Bagian A
    html += '<div class="section-title">Bagian A: Pilih Arti yang Benar (15 soal)</div>';
    bab.A.forEach((s,si)=>{
        const name = 'b'+bi+'a'+si;
        html += '<div class="soal" data-answer="'+s.a+'" data-name="'+name+'"><p><strong>'+(si+1)+'.</strong></p><p class="hanzi-q">'+s.q+'</p><div class="options">';
        s.o.forEach((opt,oi)=>{
            html += '<label><input type="radio" name="'+name+'" value="'+oi+'"> '+String.fromCharCode(65+oi)+'. '+opt+'</label>';
        });
        html += '</div></div>';
    });

    // Bagian B
    html += '<div class="section-title">Bagian B: Baca Paragraf + Pilihan Ganda (15 soal)</div>';
    let bqi = 0;
    bab.B.paragraphs.forEach((p,pi)=>{
        html += '<div class="paragraph-box">'+p.text+'</div>';
        p.qs.forEach((q,qi)=>{
            const name = 'b'+bi+'b'+bqi;
            html += '<div class="soal" data-answer="'+q.a+'" data-name="'+name+'"><p><strong>'+(16+bqi)+'.</strong> '+q.q+'</p><div class="options">';
            q.o.forEach((opt,oi)=>{
                html += '<label><input type="radio" name="'+name+'" value="'+oi+'"> '+String.fromCharCode(65+oi)+'. '+opt+'</label>';
            });
            html += '</div></div>';
            bqi++;
        });
    });

    // Bagian C
    html += '<div class="section-title">Bagian C: Susun Kalimat (10 soal)</div>';
    bab.C.forEach((c,ci)=>{
        const cid = 'b'+bi+'c'+ci;
        const shuffled = [...c.words].sort(()=>Math.random()-0.5);
        html += '<div class="soal" data-canswer="'+c.answer+'" id="'+cid+'"><p><strong>'+(31+ci)+'.</strong> Susun kata-kata berikut menjadi kalimat yang benar:</p>';
        html += '<div class="answer-line" id="'+cid+'line"></div>';
        html += '<div class="arrange-area" id="'+cid+'area">';
        shuffled.forEach(w=>{
            html += '<span class="word-chip" onclick="toggleChip(this,\''+cid+'\')">'+w+'</span>';
        });
        html += '</div></div>';
    });

    // Score & answer key
    html += '<button class="toggle-btn" onclick="checkBab('+bi+')">✅ Cek Jawaban</button>';
    html += '<div class="score-display" id="score'+bi+'"></div>';
    html += '<button class="toggle-btn" style="background:#2c3e50" onclick="toggleKunci('+bi+')">🔑 Lihat Kunci Jawaban</button>';

    html += '<h4>Kunci Jawaban '+bab.title+'</h4>';
    html += '<p><strong>Bagian A:</strong> ';
    bab.A.forEach((s,si)=>{html+=(si+1)+'.'+String.fromCharCode(65+s.a)+' ';});
    html += '</p><p><strong>Bagian B:</strong> ';
    let bk=0;
    bab.B.paragraphs.forEach(p=>{p.qs.forEach(q=>{html+=(16+bk)+'.'+String.fromCharCode(65+q.a)+' ';bk++;});});
    html += '</p><p><strong>Bagian C:</strong><br>';
    bab.C.forEach((c,ci)=>{html+=(31+ci)+'. '+c.answer+'<br>';});
    html += '</p></div>';

    div.innerHTML = html;
    babCont.appendChild(div);
});

function toggleChip(el, cid){
    const line = document.getElementById(cid+'line');
    if(el.classList.contains('selected')){
        el.classList.remove('selected');
        // remove from line
        const inLine = line.querySelector('[data-text="'+el.textContent+'"]');
        if(inLine) inLine.remove();
    } else {
        el.classList.add('selected');
        const chip = document.createElement('span');
        chip.className='word-chip';
        chip.textContent=el.textContent;
        chip.dataset.text=el.textContent;
        chip.onclick=function(){
            this.remove();
            el.classList.remove('selected');
        };
        line.appendChild(chip);
    }
}

function checkBab(bi){
    let correct=0, total=40;
    const bab = document.getElementById('bab'+bi);

    // Check A & B (radio)
    bab.querySelectorAll('.soal[data-answer]').forEach(s=>{
        const ans = parseInt(s.dataset.answer);
        const sel = s.querySelector('input:checked');
        if(sel){
            const v = parseInt(sel.value);
            if(v===ans){correct++;sel.closest('label').classList.add('correct');}
            else{sel.closest('label').classList.add('wrong');
                s.querySelectorAll('label')[ans].classList.add('correct');}
        } else {
            s.querySelectorAll('label')[ans].classList.add('correct');
        }
    });

    // Check C
    bab.querySelectorAll('.soal[data-canswer]').forEach(s=>{
        const expected = s.dataset.canswer;
        const line = s.querySelector('.answer-line');
        const chips = line.querySelectorAll('.word-chip');
        const userAns = Array.from(chips).map(c=>c.textContent).join('');
        if(userAns===expected){correct++;line.style.border='2px solid #28a745';line.style.background='#d4edda';}
        else{line.style.border='2px solid #dc3545';line.style.background='#f8d7da';}
    });

    document.getElementById('score'+bi).textContent='Skor: '+correct+'/'+total+' ('+Math.round(correct/total*100)+'%)';
}

function toggleKunci(bi){
    document.getElementById('kunci'+bi).classList.toggle('show');
}
</script>
