function buildFullBab(data) {
  // Generate reading passages and sentence arrangement
  const readingTemplates = [
    {paragraph:"小明和他的朋友们去公园玩。公园里有很多人。他们在那里待了两个小时。小明很高兴。他们下午三点回家了。回家以后，小明做了作业。",

// Build all 20 babs
for (let i = 0; i < extraBabsData.length; i++) {
  allBabs.push(buildFullBab(extraBabsData[i]));
}
for (let i = 0; i < moreBabsData.length; i++) {
  allBabs.push(buildFullBab(moreBabsData[i]));
}

// ═══════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════

// Create bab selector buttons
const babSelector = document.getElementById('bab-selector');
allBabs.forEach((bab, i) => {
  const btn = document.createElement('button');
  btn.className = 'bab-btn';
  btn.textContent = `Bab ${i + 1}`;
  btn.title = bab.title;
  btn.onclick = () => loadBab(i);
  babSelector.appendChild(btn);
});

let currentBab = -1;
let userAnswers = {};

function loadBab(index) {
  currentBab = index;
  userAnswers = {};
  const bab = allBabs[index];

  // Update button states
  document.querySelectorAll('.bab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  const container = document.getElementById('soal-container');
  let html = `<h2 style="font-family:'Playfair Display',serif; margin-bottom: 0.5rem;">${bab.title}</h2>`;
  html += `<p style="color:var(--charcoal); margin-bottom: 2rem;">40 soal: Bagian A (15), Bagian B (15), Bagian C (10)</p>`;

  // BAGIAN A
  html += `<div class="bagian-header">Bagian A — Baca Kalimat</div>`;
  html += `<p class="bagian-desc">Baca kalimat Bahasa Mandarin, pilih arti/jawaban yang benar.</p>`;

  bab.bagianA.forEach((soal, i) => {
    html += `<div class="soal-item" id="soal-a-${i}">`;
    html += `<div class="soal-number">Soal ${i + 1}</div>`;
    html += `<div class="soal-text">${soal.q}</div>`;
    html += `<div class="soal-text-id">${soal.ask}</div>`;
    html += `<div class="soal-options">`;
    soal.opts.forEach((opt, j) => {
      html += `<button class="soal-option" onclick="selectAnswer('a',${i},${j},${soal.ans})" id="opt-a-${i}-${j}">${String.fromCharCode(65+j)}. ${opt}</button>`;
    });
    html += `</div></div>`;
  });

  // BAGIAN B
  html += `<div class="bagian-header">Bagian B — Membaca Paragraf</div>`;
  html += `<p class="bagian-desc">Baca paragraf, lalu jawab pertanyaan yang mengikutinya.</p>`;

  let bNo = 16;
  bab.bagianB.forEach((passage, pi) => {
    html += `<div style="background: var(--paper); padding: 1.25rem 1.5rem; border-radius: var(--radius-md); margin-bottom: 1rem; border-left: 4px solid var(--jade);">`;
    html += `<div style="font-family:'Noto Sans SC',sans-serif; font-size: 1.05rem; line-height: 2;">${passage.paragraph}</div>`;
    html += `</div>`;

    passage.questions.forEach((q, qi) => {
      const soalIdx = pi * 3 + qi;
      html += `<div class="soal-item" id="soal-b-${soalIdx}">`;
      html += `<div class="soal-number">Soal ${bNo}</div>`;
      html += `<div class="soal-text">${q.q}</div>`;
      html += `<div class="soal-options">`;
      q.opts.forEach((opt, j) => {
        html += `<button class="soal-option" onclick="selectAnswer('b',${soalIdx},${j},${q.ans})" id="opt-b-${soalIdx}-${j}">${String.fromCharCode(65+j)}. ${opt}</button>`;
      });
      html += `</div></div>`;
      bNo++;
    });
  });

  // BAGIAN C
  html += `<div class="bagian-header">Bagian C — Susun Kalimat</div>`;
  html += `<p class="bagian-desc">Susun kata-kata yang diacak menjadi kalimat yang benar.</p>`;

  bab.bagianC.forEach((soal, i) => {
    // Shuffle words for display
    const shuffled = [...soal.words].sort(() => Math.random() - 0.5);
    html += `<div class="soal-item" id="soal-c-${i}">`;
    html += `<div class="soal-number">Soal ${31 + i}</div>`;
    html += `<p class="soal-text-id">Susun kata-kata berikut menjadi kalimat yang benar:</p>`;
    html += `<div class="susun-words">`;
    shuffled.forEach(w => {
      html += `<span class="word-chip">${w}</span>`;
    });
    html += `</div>`;
    html += `<div style="margin-top: 0.5rem;">`;
    html += `<input type="text" class="auth-input" id="susun-input-${i}" placeholder="Tulis jawabanmu di sini..." style="margin-bottom:0;">`;
    html += `</div></div>`;
  });

  // Kunci Jawaban
  html += `<div class="kunci-toggle">`;
  html += `<button class="kunci-btn" onclick="toggleKunci()">📋 Lihat Kunci Jawaban</button>`;
  html += `</div>`;

  html += `<div class="kunci-jawaban" id="kunci-jawaban">`;
  html += `<h3>🔑 Kunci Jawaban — ${bab.title}</h3>`;

  html += `<p style="font-weight:600; margin: 1rem 0 0.5rem; color: var(--vermillion);">Bagian A:</p>`;
  html += `<div class="kunci-list">`;
  bab.bagianA.forEach((s, i) => {
    html += `<div class="kunci-item"><span class="no">${i+1}.</span> ${String.fromCharCode(65+s.ans)}</div>`;
  });
  html += `</div>`;

  html += `<p style="font-weight:600; margin: 1rem 0 0.5rem; color: var(--jade);">Bagian B:</p>`;
  html += `<div class="kunci-list">`;
  let kNo = 16;
  bab.bagianB.forEach((p) => {
    p.questions.forEach((q) => {
      html += `<div class="kunci-item"><span class="no">${kNo}.</span> ${String.fromCharCode(65+q.ans)}</div>`;
      kNo++;
    });
  });
  html += `</div>`;

  html += `<p style="font-weight:600; margin: 1rem 0 0.5rem; color: var(--gold);">Bagian C:</p>`;
  html += `<div class="kunci-list" style="grid-template-columns: 1fr;">`;
  bab.bagianC.forEach((s, i) => {
    html += `<div class="kunci-item"><span class="no">${31+i}.</span> ${s.ans}</div>`;
  });
  html += `</div></div>`;

  container.innerHTML = html;
  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function selectAnswer(section, qIndex, optIndex, correctIndex) {
  const key = `${section}-${qIndex}`;
  if (userAnswers[key] !== undefined) return; // Already answered
  userAnswers[key] = optIndex;

  const opts = document.querySelectorAll(`#soal-${section}-${qIndex} .soal-option`);
  opts.forEach((opt, i) => {
    if (i === correctIndex) {
      opt.classList.add('correct');
    } else if (i === optIndex && optIndex !== correctIndex) {
      opt.classList.add('wrong');
    }
    opt.style.pointerEvents = 'none';
  });
}

function toggleKunci() {
  const el = document.getElementById('kunci-jawaban');
  el.classList.toggle('show');
}

// Navbar scroll
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
});
</script>
